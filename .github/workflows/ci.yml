name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: poetry

      - name: Install dependencies
        run: poetry sync

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format
        run: poetry run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry

      - name: Install dependencies
        run: poetry sync

      - name: Run tests
        run: poetry run pytest --cov=altissimo --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: poetry

      - name: Build package
        run: poetry build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "from altissimo.auth import __version__; print(f'altissimo-auth {__version__}')"
